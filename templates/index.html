<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klaviyo Oversætter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --accent: #6c63ff; --accent2: #a78bfa; --text: #e2e8f0; --muted: #64748b;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .logo { font-size: 1rem; font-weight: 600; color: var(--accent2); margin-bottom: 48px; }
    .logo span { color: var(--muted); font-weight: 400; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 44px; width: 100%; max-width: 480px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p  { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 28px; }
    label {
      display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 13px 16px; font-size: 1rem; color: var(--text);
      outline: none; transition: border-color 0.15s; margin-bottom: 16px;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    button {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 13px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #5b52e0; }
    .logout { display: block; text-align: center; margin-top: 20px;
              color: var(--muted); font-size: 0.8rem; text-decoration: none; }
    .logout:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="logo">Klaviyo <span>Oversætter</span></div>

  <div class="card">
    <h1>Oversæt template</h1>
    <p>Skriv det præcise navn på den template du vil oversætte og lokalttilpasse til alle lande.</p>

    <form method="GET" action="/review">
      <label for="t">Template navn</label>
      <input type="text" id="t" name="template"
             placeholder="f.eks. Velkomst email — DK"
             autocomplete="off" spellcheck="false" autofocus required />
      <button type="submit">Start gennemgang →</button>
    </form>
  </div>

  <a href="/logout" class="logout">Log ud</a>
</body>
</html>
