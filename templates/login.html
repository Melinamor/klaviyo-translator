<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log ind — Klaviyo Oversætter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 6px;
    }
    .logo span { color: #64748b; font-weight: 400; }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 20px 0 6px;
    }

    p.sub {
      color: #64748b;
      font-size: 0.88rem;
      margin-bottom: 28px;
    }

    input[type="password"] {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 1rem;
      color: #e2e8f0;
      outline: none;
      text-align: center;
      letter-spacing: 0.12em;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #6c63ff; }

    .error-msg {
      color: #ef4444;
      font-size: 0.82rem;
      margin-top: 8px;
    }

    button {
      width: 100%;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
      transition: background 0.15s;
    }
    button:hover { background: #5b52e0; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">Klaviyo <span>Oversætter</span></div>
    <h1>Log ind</h1>
    <p class="sub">Kun til intern brug</p>

    <form method="POST">
      <input
        type="password"
        name="password"
        placeholder="Adgangskode"
        autofocus
        autocomplete="current-password"
      />
      {% if error %}
      <div class="error-msg">Forkert adgangskode. Prøv igen.</div>
      {% endif %}
      <button type="submit">Log ind</button>
    </form>
  </div>
</body>
</html>
